<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人科研助理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF'
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .card-hover { @apply transition-all duration-300 hover:shadow-lg hover:-translate-y-1; }
            .section-title { @apply text-lg md:text-xl font-semibold text-gray-800 mb-3 flex items-center gap-2; }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
<div class="max-w-7xl mx-auto px-4 py-8">
    <header class="text-center mb-10">
        <h1 class="text-[clamp(1.8rem,4vw,2.8rem)] font-bold text-primary mb-2">🧪 个人科研助理导航</h1>
        <p class="text-gray-500">纯本地 · 无后端 · 可计数 · 易维护</p>
    </header>
    <div id="tool-container"></div>
</div>

<script>
// ==============================================
// 🔴 所有链接都在这里，修改这里即可！
// ==============================================
const toolList = [
    {
        section: "科研绘图工具",
        icon: "paint-brush",
        items: [
            { name: "Mermaid",        url: "https://mermaid.nodejs.cn",          icon: "code-fork",    color: "blue-500" },
            { name: "Flourish",       url: "https://flourish.studio",            icon: "line-chart",   color: "green-600" },
            { name: "ImageGP",       url: "https://www.bic.ac.cn/ImageGP",      icon: "bar-chart",    color: "red-500" },
            { name: "s-plot",        url: "https://github.com/Tong-Chen/s-plot",icon: "area-chart",   color: "orange-500" },
            { name: "E-Venn",        url: "https://www.bic.ac.cn/EVenn/",       icon: "circle-o",     color: "purple-500" },
            { name: "ChiPlot",       url: "https://chiplot.online",             icon: "pie-chart",    color: "teal-500" },
            { name: "RAWgraphs",     url: "https://www.rawgraphs.io",           icon: "cubes",        color: "indigo-500" },
            { name: "GraphPad",      url: "https://www.graphpad.com/",          icon: "square",       color: "red-600" },
            { name: "BioRender",     url: "https://biorender.com/",             icon: "flask",        color: "pink-500" },
            { name: "Matplotlib",    url: "https://matplotlib.org/",            icon: "python",       color: "blue-600" },
        ]
    },
    {
        section: "学术搜索",
        icon: "search",
        items: [
            { name: "谷歌学术",      url: "https://scholar.google.com",         icon: "google",       color: "blue-600" },
            { name: "arXiv",         url: "https://arxiv.org",                  icon: "book",         color: "orange-500" },
            { name: "知网",          url: "https://www.cnki.net",               icon: "file-text",    color: "red-500" },
        ]
    },
    {
        section: "数据 & 计算",
        icon: "table",
        items: [
            { name: "Wolfram",       url: "https://www.wolframalpha.com",       icon: "calculator",   color: "indigo-500" },
            { name: "SPSSPRO",       url: "https://www.spsspro.com",            icon: "bar-chart",    color: "teal-500" },
        ]
    },
    {
        section: "邮箱",
        icon: "envelope",
        items: [
            { name: "163邮箱",       url: "https://mail.163.com",               icon: "envelope-o",    color: "gray-600" },
            { name: "Gmail",         url: "https://mail.google.com",            icon: "google",       color: "red-500" },
        ]
    },
    {
        section: "常用主页",
        icon: "home",
        items: [
            { name: "GitHub",        url: "https://github.com",                 icon: "github",       color: "black" },
            { name: "百度",          url: "https://www.baidu.com",              icon: "search",       color: "blue-500" },
        ]
    },
    {
        section: "娱乐",
        icon: "gamepad",
        items: [
            { name: "优酷",          url: "https://www.youku.com/ku/webhome",   icon: "play-circle",  color: "red-500" },
            { name: "哔哩哔哩",      url: "https://www.bilibili.com",           icon: "film",         color: "pink-500" },
            { name: "小红书",        url: "https://www.xiaohongshu.com",       icon: "heart",        color: "orange-500" },
        ]
    }
];

function initCount(name) {
    const key = `count_${name}`;
    return localStorage.getItem(key) || 0;
}

function addCount(name) {
    const key = `count_${name}`;
    const now = parseInt(localStorage.getItem(key) || 0);
    localStorage.setItem(key, now + 1);
}

function render() {
    const container = document.getElementById("tool-container");
    container.innerHTML = "";

    toolList.forEach(sec => {
        let secHtml = `
        <section class="mb-12">
            <h2 class="section-title"><i class="fa fa-${sec.icon} text-primary"></i> ${sec.section}</h2>
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4">
        `;

        sec.items.forEach(t => {
            const count = initCount(t.name);
            secHtml += `
            <div class="tool-card bg-white p-4 rounded-xl flex flex-col items-center card-hover cursor-pointer"
                 data-name="${t.name}" data-url="${t.url}">
                <i class="fa fa-${t.icon} text-2xl text-${t.color}"></i>
                <p class="text-sm mt-2">${t.name}</p>
                <span class="text-xs text-gray-400 count">${count} 次</span>
            </div>`;
        });

        secHtml += `</div></section>`;
        container.innerHTML += secHtml;
    });

    document.querySelectorAll('.tool-card').forEach(card => {
        card.addEventListener('click', () => {
            const name = card.dataset.name;
            const url  = card.dataset.url;
            addCount(name);
            card.querySelector('.count').innerText = (parseInt(initCount(name)) + 1) + " 次";
            window.open(url, '_blank');
        });
    });
}

window.onload = render;
</script>
</body>
</html>
